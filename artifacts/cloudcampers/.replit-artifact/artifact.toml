kind = "web"
previewPath = "/"
title = "CloudCampers - Salesforce & MuleSoft Consulting"
version = "1.0.0"
id = "artifacts/cloudcampers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20317

[services.development]
run = "pnpm --filter @workspace/cloudcampers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloudcampers", "run", "build" ]
publicDir = "artifacts/cloudcampers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20317"
BASE_PATH = "/"
